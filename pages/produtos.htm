<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produtos | Fanáticos Clube</title>

    <link rel="stylesheet" href="../assets/css/produtos.css">
</head>

<body>

    <!-- HEADER -->
    <header class="cabecalho">

        <div class="logo-area">
            <img src="../assets/image/logo_e-commerce_01.png" class="logo">

            <img src="../assets/image/nome_logo_fanáticos.png" class="nome-logo">
        </div>

        <nav class="menu">
            <a href="">Categorias</a>
            <a href="">Lançamentos</a>
            <a href="">Times</a>
            <a href="">Promoções</a>
        </nav>

    </header>

    <!-- BANNER -->
    <section class="banner">

        <h1>CAMISAS OFICIAIS</h1>

        <p>
            Encontre os mantos dos maiores clubes do mundo.
        </p>

    </section>

    <!-- FILTROS -->
    <section class="filtros">

        <input type="text" placeholder="Pesquisar camisa...">

        <select>
            <option>Todos os Times</option>
            <option>Flamengo</option>
            <option>Corinthians</option>
            <option>Palmeiras</option>
            <option>Barcelona</option>
        </select>

    </section>

    <!-- PRODUTOS -->
    <section class="produtos">

        <div class="grid-produtos">

            <!-- CARD -->
            <div class="card-produto">

                <img src="../assets/image/camisas/flamengo.jpg">

                <h3>Camisa Flamengo 2025</h3>

                <p class="preco">R$ 199,90</p>

                <button>Comprar</button>

            </div>

            <!-- CARD -->
            <div class="card-produto">

                <img src="../assets/image/camisas/corinthians.jpg">

                <h3>Camisa Corinthians 2025</h3>

                <p class="preco">R$ 219,90</p>

                <button>Comprar</button>

            </div>

            <!-- CARD -->
            <div class="card-produto">

                <img src="../assets/image/camisas/palmeiras.jpg">

                <h3>Camisa Palmeiras 2025</h3>

                <p class="preco">R$ 209,90</p>

                <button>Comprar</button>

            </div>

            <!-- CARD -->
            <div class="card-produto">

                <img src="../assets/image/camisas/barcelona.jpg">

                <h3>Camisa Barcelona 2025</h3>

                <p class="preco">R$ 229,90</p>

                <button>Comprar</button>

            </div>

        </div>

    </section>

</body>
</html>
